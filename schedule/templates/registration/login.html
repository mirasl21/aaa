<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Вход</title>
    <style>
    * {
        box-sizing: border-box;
    }

    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #0b0b0f;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .login-box {
        background: #121217;
        padding: 40px 30px;
        border-radius: 20px;
        width: 340px;
        box-shadow: 0 20px 60px rgba(0,0,0,0.7);
        text-align: center;
        color: white;
    }

    h2 {
        margin-bottom: 25px;
        font-weight: 600;
    }

    .form-group {
        margin-bottom: 15px;
    }

    input {
        width: 100%;
        padding: 12px 14px;
        border-radius: 10px;
        border: 1px solid #2a2a35;
        background: #0d0d12;
        color: white;
        font-size: 14px;
        transition: 0.2s;
    }

    input:focus {
        outline: none;
        border-color: #6d5dfc;
        box-shadow: 0 0 0 2px rgba(109,93,252,0.2);
    }

    input::placeholder {
        color: #666;
    }

    button {
        width: 100%;
        padding: 12px;
        margin-top: 10px;
        border: none;
        border-radius: 10px;
        background: linear-gradient(135deg, #6d5dfc, #4f46e5);
        color: white;
        font-size: 15px;
        font-weight: 500;
        cursor: pointer;
        transition: 0.2s;
    }

    button:hover {
        transform: translateY(-1px);
        box-shadow: 0 5px 15px rgba(109,93,252,0.3);
    }

    .errorlist {
        color: #ff4d4d;
        font-size: 13px;
        text-align: left;
        margin-bottom: 10px;
    }
</style>
</head>
<body>

<div class="login-box">
    <h2>Вход</h2>

    <form method="post">
    {% csrf_token %}

    {{ form.non_field_errors }}

    <div class="form-group">
        <input type="text" name="username" placeholder="Логин" required>
    </div>

    <div class="form-group">
        <input type="password" name="password" placeholder="Пароль" required>
    </div>

    <button type="submit">Войти</button>
</form>
</div>

</body>
</html>
